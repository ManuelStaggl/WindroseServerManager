<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Windrose Server Manager">
  <defs>
    <linearGradient id="brass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5B042"/>
      <stop offset="50%" stop-color="#D97706"/>
      <stop offset="100%" stop-color="#92400E"/>
    </linearGradient>
  </defs>
  <g fill="none" stroke="url(#brass)" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round">
    <circle cx="32" cy="32" r="28" stroke-width="2"/>
    <circle cx="32" cy="32" r="22"/>
  </g>
  <g fill="url(#brass)">
    <!-- 4 cardinal long arms (N, E, S, W) -->
    <polygon points="32,6 29,32 32,30 35,32"/>
    <polygon points="32,58 29,32 32,34 35,32"/>
    <polygon points="6,32 32,29 30,32 32,35"/>
    <polygon points="58,32 32,29 34,32 32,35"/>
    <!-- 4 diagonal short arms -->
    <polygon points="14,14 31,31 32,28 28,32"/>
    <polygon points="50,14 33,31 32,28 36,32"/>
    <polygon points="14,50 31,33 28,32 32,36"/>
    <polygon points="50,50 33,33 36,32 32,36"/>
    <circle cx="32" cy="32" r="2.5"/>
  </g>
  <g fill="url(#brass)" font-family="Inter, Segoe UI, sans-serif" font-size="6" font-weight="700" text-anchor="middle">
    <text x="32" y="12">N</text>
    <text x="32" y="56" dy="0.3em">S</text>
    <text x="10" y="34">W</text>
    <text x="54" y="34">E</text>
  </g>
</svg>
